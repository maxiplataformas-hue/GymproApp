<div class="bg-surface border border-border rounded-3xl p-6 md:p-8 shadow-sm h-full flex flex-col hide-scrollbar">

    <div class="mb-6">
        <h3 class="font-black text-2xl text-text">Ficha Técnica & Clínica</h3>
        <p class="text-sm text-text-muted mt-1">Registra y actualiza la anatomía, capacidades y nutrición del alumno.
        </p>
    </div>

    <form [formGroup]="profileForm" (ngSubmit)="saveProfile()"
        class="flex-1 overflow-y-auto space-y-8 pr-2 hide-scrollbar">

        <!-- 1. Perfil Base -->
        <section class="space-y-4">
            <h4 class="font-bold text-text border-b border-border pb-2 flex items-center gap-2">
                <svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                </svg>
                Perfil Deportivo Base
            </h4>
            <div class="grid md:grid-cols-2 gap-4">
                <div class="flex flex-col gap-1.5 md:col-span-2">
                    <label class="text-xs font-bold text-text-muted uppercase tracking-wider pl-1">Objetivo Declarado
                        del Alumno</label>
                    <textarea formControlName="objective" rows="2"
                        placeholder="Ej: Hipertrofia, Pérdida de grasa, Recomposición..."
                        class="w-full px-4 py-3 bg-background border border-border rounded-xl text-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors text-text placeholder-text-muted resize-none scrollbar-hide"></textarea>
                </div>
                <div class="flex flex-col gap-1.5 border border-border rounded-xl p-4 bg-background">
                    <label class="text-xs font-bold text-text-muted uppercase tracking-wider">Biotipo</label>
                    <select formControlName="biotype"
                        class="w-full bg-transparent text-text font-bold text-lg focus:outline-none cursor-pointer">
                        <option value="">Selecciona Biotipo...</option>
                        <option value="Ectomorfo">Ectomorfo</option>
                        <option value="Mesomorfo">Mesomorfo</option>
                        <option value="Endomorfo">Endomorfo</option>
                    </select>
                </div>
            </div>
        </section>

        <!-- 2. Antropometría y Bioimpedancia -->
        <section class="space-y-4">
            <h4 class="font-bold text-text border-b border-border pb-2 flex items-center gap-2">
                <svg class="w-5 h-5 text-secondary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z">
                    </path>
                </svg>
                Composición Corporal
            </h4>
            <div class="grid md:grid-cols-2 gap-4">
                <div class="flex flex-col gap-1.5 flex-1">
                    <label class="text-xs font-bold text-text-muted uppercase tracking-wider pl-1">Antropometría
                        (Perímetros)</label>
                    <textarea formControlName="anthropometry" rows="4"
                        placeholder="Pecho: 105cm&#10;Cintura: 80cm&#10;Bíceps contraído: 38cm..."
                        class="w-full px-4 py-3 bg-background border border-border rounded-xl text-sm focus:outline-none focus:border-secondary transition-colors text-text placeholder-text-muted resize-none"></textarea>
                </div>
                <div class="flex flex-col gap-1.5 flex-1">
                    <label class="text-xs font-bold text-text-muted uppercase tracking-wider pl-1">Datos de
                        Bioimpedancia</label>
                    <textarea formControlName="bioimpedanceData" rows="4"
                        placeholder="Masa Muscular: 45kg&#10;Grasa Visceral: Nivel 4&#10;Agua Corporal: 60%..."
                        class="w-full px-4 py-3 bg-background border border-border rounded-xl text-sm focus:outline-none focus:border-secondary transition-colors text-text placeholder-text-muted resize-none"></textarea>
                </div>
            </div>
        </section>

        <!-- 3. Biomecánica -->
        <section class="space-y-4">
            <h4 class="font-bold text-text border-b border-border pb-2 flex items-center gap-2">
                <svg class="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
                Análisis Biomecánico
            </h4>
            <div class="flex flex-col gap-1.5">
                <label class="text-xs font-bold text-text-muted uppercase tracking-wider pl-1">Ventajas/Desventajas:
                    Fuerza de Ejecución y Movilidad</label>
                <textarea formControlName="mobilityAnalysis" rows="4"
                    placeholder="Ej: Excelente dorsiflexión en sentadilla, pero restricción en la rotación interna del hombro derecho que afecta el press de pecho. Poca activación de isquio en el peso muerto..."
                    class="w-full px-4 py-3 bg-background border border-border rounded-xl text-sm focus:outline-none focus:border-indigo-500 transition-colors text-text placeholder-text-muted resize-none"></textarea>
            </div>
        </section>

        <!-- 4. Nutrición -->
        <section class="space-y-4">
            <h4 class="font-bold text-text border-b border-border pb-2 flex items-center gap-2">
                <svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 15.546c-.523 0-1.046.151-1.5.454a2.704 2.704 0 01-3 0 2.704 2.704 0 00-3 0 2.704 2.704 0 01-3 0 2.704 2.704 0 00-3 0 2.704 2.704 0 01-3 0 2.701 2.701 0 00-1.5-.454M9 6v2m3-2v2m3-2v2M9 3h.01M12 3h.01M15 3h.01M21 21v-7a2 2 0 00-2-2H5a2 2 0 00-2 2v7h18zm-3-9v-2a2 2 0 00-2-2H8a2 2 0 00-2 2v2h12z">
                    </path>
                </svg>
                Plan Nutricional y Farmacología
            </h4>
            <div class="grid md:grid-cols-2 gap-4">
                <div class="flex flex-col gap-1.5 md:col-span-2">
                    <label class="text-xs font-bold text-text-muted uppercase tracking-wider pl-1">Dieta por
                        Periodo</label>
                    <textarea formControlName="dietPlan" rows="3"
                        placeholder="Fase Volumen (Sep-Dic): 3200 kcal. 45% CH, 30% P, 25% G..."
                        class="w-full px-4 py-3 bg-background border border-border rounded-xl text-sm focus:outline-none focus:border-green-500 transition-colors text-text placeholder-text-muted resize-none"></textarea>
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-bold text-text-muted uppercase tracking-wider pl-1">Suplementación
                        Regular</label>
                    <textarea formControlName="supplements" rows="3"
                        placeholder="Creatina Monohidrato 5g/día. Whey Protein post-entreno..."
                        class="w-full px-4 py-3 bg-background border border-border rounded-xl text-sm focus:outline-none focus:border-green-500 transition-colors text-text placeholder-text-muted resize-none"></textarea>
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-bold text-text-muted uppercase tracking-wider pl-1">Coadyuvantes
                        Suplementarios (PEDs, etc)</label>
                    <textarea formControlName="adjuncts" rows="3"
                        placeholder="Vitamina C, Ácido Alfa Lipoico, Cafeína 200mg pre-entreno. N/A."
                        class="w-full px-4 py-3 bg-background border border-border rounded-xl text-sm focus:outline-none focus:border-red-500 transition-colors text-text placeholder-text-muted resize-none"></textarea>
                </div>
            </div>
        </section>

        <!-- Submit Button -->
        <div class="pt-6 sticky bottom-0 bg-gradient-to-t from-surface pb-2">
            <button type="submit"
                class="w-full bg-primary text-white font-bold py-4 rounded-2xl hover:bg-primary-dark transition-colors shadow-lg shadow-primary/30 flex justify-center items-center gap-2 cursor-pointer">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4">
                    </path>
                </svg>
                Guardar Ficha del Alumno
            </button>
        </div>

    </form>
</div>
