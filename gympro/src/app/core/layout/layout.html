<div class="flex h-screen w-full bg-background text-text overflow-hidden transition-colors duration-500">

    <!-- Sidebar for Desktop -->
    <aside class="hidden md:flex flex-col w-64 border-r border-border bg-surface shadow-sm h-full flex-shrink-0 z-20">
        <div class="p-6 border-b border-border flex items-center justify-center">
            <h1 class="text-3xl font-black tracking-tighter">GYM<span class="text-primary">PRO</span></h1>
        </div>

        <nav class="flex-1 px-4 py-8 space-y-2 overflow-y-auto">
            @if (auth.isCoach()) {
            <!-- Coach Menu -->
            <a routerLink="/app/coach" routerLinkActive="bg-primary text-white"
                [routerLinkActiveOptions]="{exact: true}"
                class="flex items-center gap-3 px-4 py-3 rounded-xl text-text-muted hover:bg-border/50 transition-all font-medium">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z">
                    </path>
                </svg>
                Alumnos
            </a>
            } @else {
            <!-- Student Menu -->
            <a routerLink="/app/student" routerLinkActive="bg-primary text-white"
                [routerLinkActiveOptions]="{exact: true}"
                class="flex items-center gap-3 px-4 py-3 rounded-xl text-text-muted hover:bg-border/50 transition-all font-medium">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6">
                    </path>
                </svg>
                Inicio
            </a>
            <!-- Add other links if routing permits, e.g /app/student/calendar -->
            }
        </nav>
        <div class="p-4 border-t border-border">
            <button (click)="logout()"
                class="w-full flex items-center justify-center gap-2 text-secondary font-medium px-4 py-2 hover:bg-secondary/10 rounded-xl transition-colors cursor-pointer">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1">
                    </path>
                </svg>
                Salir
            </button>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col h-full overflow-hidden relative bg-background">
        <div class="flex-1 overflow-y-auto w-full p-4 md:p-8 pb-28 md:pb-8">
            <router-outlet></router-outlet>
        </div>

        <!-- Mobile Bottom Navigation -->
        <nav
            class="md:hidden fixed bottom-0 left-0 w-full bg-surface/95 backdrop-blur-md border-t border-border px-6 py-4 flex justify-around items-center z-50 rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.06)]">
            @if (auth.isCoach()) {
            <a routerLink="/app/coach" routerLinkActive="text-primary" [routerLinkActiveOptions]="{exact: true}"
                class="flex flex-col items-center gap-1 text-text-muted transition-colors w-16">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z">
                    </path>
                </svg>
                <span class="text-[10px] font-semibold">Alumnos</span>
            </a>
            } @else {
            <a routerLink="/app/student" routerLinkActive="text-primary" [routerLinkActiveOptions]="{exact: true}"
                class="flex flex-col items-center gap-1 text-text-muted transition-colors w-16">
                <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6">
                    </path>
                </svg>
                <span class="text-[10px] font-semibold">Inicio</span>
            </a>
            }
            <button (click)="logout()"
                class="flex flex-col items-center gap-1 text-secondary transition-colors w-16 cursor-pointer">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1">
                    </path>
                </svg>
                <span class="text-[10px] font-semibold">Salir</span>
            </button>
        </nav>
    </main>
</div>
