<div class="min-h-screen w-full flex flex-col items-center justify-center p-4">
    <div
        class="w-full max-w-md bg-surface border border-border rounded-2xl shadow-xl overflow-hidden p-8 animate-fade-in-up transition-colors duration-300">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold mb-2 text-text">
                GYM<span class="text-primary">PRO</span>
            </h1>
            <p class="text-text-muted">Ingresa tu correo para continuar</p>
        </div>

        <form (submit)="$event.preventDefault(); onSubmit()" class="flex flex-col gap-5">
            <div class="flex flex-col gap-1">
                <label for="email" class="text-sm font-semibold text-text">Correo Electrónico</label>
                <input id="email" type="email" [formControl]="emailControl" placeholder="entrenador@ejemplo.com"
                    class="w-full px-4 py-3 rounded-xl border border-border bg-background text-text focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all placeholder-text-muted">
                @if (emailControl.touched && emailControl.invalid) {
                <span class="text-secondary text-xs mt-1 animate-pulse">Por favor, ingresa un correo válido.</span>
                }
            </div>

            <button type="submit"
                class="w-full bg-primary text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-primary/30 hover:shadow-primary/50 hover:-translate-y-0.5 active:translate-y-0 transition-all cursor-pointer">
                Ingresar
            </button>
        </form>

        <div class="mt-10">
            <p class="text-sm text-center text-text-muted mb-4">Elige tu tema favorito</p>
            <div class="flex justify-center gap-3">
                <button (click)="setTheme('light')"
                    class="w-10 h-10 rounded-full bg-gray-100 border-2 border-gray-300 hover:scale-110 transition-transform cursor-pointer"
                    aria-label="Tema Claro"></button>
                <button (click)="setTheme('dark')"
                    class="w-10 h-10 rounded-full bg-slate-900 border-2 border-slate-700 hover:scale-110 transition-transform cursor-pointer"
                    aria-label="Tema Oscuro"></button>
                <button (click)="setTheme('pink')"
                    class="w-10 h-10 rounded-full bg-pink-500 border-2 border-pink-300 hover:scale-110 transition-transform cursor-pointer"
                    aria-label="Tema Rosa"></button>
            </div>
        </div>
    </div>
</div>
